<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AireClar — Xarxa de qualitat de l’aire</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <header class="topbar">
    <h1>AireClar</h1>
    <p>Xarxa de qualitat de l’aire · Consulta de mesures per dates</p>
  </header>

  <div class="layout">
    <aside class="panel">
      <h2>Dates</h2>
      <p class="hint">Pots seleccionar múltiples dates (Ctrl/Cmd).</p>

      <select id="datesSelect" multiple size="12" aria-label="Selecciona dates"></select>

      <button id="searchBtn" class="primary">Cerca</button>

      <div id="message" class="message" role="status" aria-live="polite"></div>
    </aside>

    <main class="content">
      <h2>Resultats</h2>

      <div class="tableWrap">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>Data</th>
              <th>PM2.5</th>
              <th>PM10</th>
              <th>AQI</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <!-- Pintar files aquí -->
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn">Anterior</button>
        <span id="pageInfo" class="pageInfo">Pàgina 1</span>
        <button id="nextBtn">Següent</button>
      </div>
    </main>
  </div>
  <script type="module">
    import {getSelectValues} from './assets/js/dates.js';
    import AireService from "./assets/service/AireService.js";
    import {View} from "./assets/view/View.js";

    const service = new AireService();
    const view = new View();
    const selectDate = document.querySelector("#datesSelect");
    const button = document.querySelector("#searchBtn");
    const prevBtn = document.querySelector("#prevBtn");
    const nextBtn = document.querySelector("#nextBtn");
    const paginacion = [];
    let index = 0;

    async function buttonEvent(){
      const value = getSelectValues(selectDate);
      const response = await service.loadAire(value);
      let models = [];
      for (const model of response) {
        console.log(models.length,model.data)
        if (models.length < 4){
          models.push(model);
          continue;
        }
        models.push(model);
        paginacion.push(models);
        models = [];
      }
      if (models.length > 0){
        paginacion.push(models);
      }
      if (paginacion.length > 0){
        view.pintarFilas(paginacion[0]);
      }

    }

   (() => {
     view.pintarDates();
      button.addEventListener("click", async () => {
        await buttonEvent();
        view.checkPaginacion(index);
      })
     nextBtn.addEventListener("click", async () => {
       view.pintarFilas(paginacion[++index]);
       view.checkPaginacion(index);
     })
     prevBtn.addEventListener("click", async () => {
       view.pintarFilas(paginacion[--index]);
       view.checkPaginacion(index);

     })
     view.checkPaginacion(index);
   })();
  </script>
</body>

</html>
